name: alleycat_gpg
description: AlleyCat GPG — Encrypt and decrypt messages and files for secure SMS communication.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # OpenPGP crypto — pure Dart, no native deps, F-Droid compatible
  openpgp: ^4.2.0

  # UI
  material_color_utilities: ^0.8.0
  dynamic_color: ^1.7.0

  # QR code generation and scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # File handling
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0

  # Clipboard
  flutter_clipboard_manager: ^0.0.1

  # Secure local storage for keys
  flutter_secure_storage: ^9.2.2

  # QR share sheet
  screenshot: ^3.0.0

  # Misc
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

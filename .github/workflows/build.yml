name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Decode keystore (if signing secrets available)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK (for F-Droid / direct download)
        run: flutter build apk --release

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          cp build/flutter/outputs/flutter-apk/app-release.apk \
             "AlleyCat-GPG-${VERSION}-universal.apk"
          cp build/flutter/outputs/flutter-apk/app-arm64-v8a-release.apk \
             "AlleyCat-GPG-${VERSION}-arm64.apk" 2>/dev/null || true
          cp build/flutter/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             "AlleyCat-GPG-${VERSION}-arm32.apk" 2>/dev/null || true
          cp build/flutter/outputs/flutter-apk/app-x86_64-release.apk \
             "AlleyCat-GPG-${VERSION}-x86_64.apk" 2>/dev/null || true

      - name: Generate SHA256 checksums
        run: |
          sha256sum AlleyCat-GPG-*.apk > checksums.txt
          cat checksums.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            AlleyCat-GPG-*.apk
            checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AlleyCat GPG Android ${{ steps.version.outputs.tag }}
          body: |
            ## AlleyCat GPG Android ${{ steps.version.outputs.tag }}

            Encrypt and decrypt messages and files for secure SMS communication.
            No ISP or cell tower visibility into your message content.

            ### Install

            | File | Architecture | Notes |
            |------|-------------|-------|
            | `AlleyCat-GPG-*-universal.apk` | All devices | Use this if unsure |
            | `AlleyCat-GPG-*-arm64.apk` | Modern phones (2017+) | Smaller download |
            | `AlleyCat-GPG-*-arm32.apk` | Older phones | |
            | `AlleyCat-GPG-*-x86_64.apk` | Emulators / x86 tablets | |

            **To install:** Download the APK, open it on your Android device.
            You may need to enable "Install from unknown sources" in Settings → Security.

            ### Security
            - All crypto via [openpgp Dart library](https://pub.dev/packages/openpgp) — open source
            - Private keys stored in Android KeyStore (encrypted)
            - No network requests — fully local
            - No telemetry

            ### Verify your download
            Check `checksums.txt` against your downloaded APK:
            ```
            sha256sum AlleyCat-GPG-*-universal.apk
            ```
          files: |
            AlleyCat-GPG-*.apk
            checksums.txt
          permissions:
            contents: write
